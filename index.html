<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲食照片紀錄</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f8fafc; margin:0; padding:20px; }
    .container { max-width:900px; margin:auto; }
    .card { background:white; border-radius:16px; padding:20px; margin-bottom:20px; box-shadow:0 4px 10px rgba(0,0,0,0.08); }
    h1 { color: #1e293b; text-align: center; }
    label { font-weight: bold; color: #475569; }
    input, select, textarea, button { width:100%; padding:12px; margin-top:10px; border-radius:10px; border:1px solid #cbd5e1; box-sizing:border-box; font-size: 16px; }
    button { background:#2563eb; color:white; border:none; cursor:pointer; font-weight: bold; transition: 0.2s; }
    button:hover { background:#1d4ed8; }
    img { width:100%; max-height:400px; object-fit:contain; background:#f1f5f9; border-radius:12px; margin-top:10px; border: 1px solid #e2e8f0; }
    .delete { background:#ef4444; margin-top: 15px; }
    .delete:hover { background:#dc2626; }
    .time { font-size:14px; color:#64748b; margin-top:8px; display: flex; align-items: center; gap: 4px; }
    .no-data { text-align:center; color:#94a3b8; padding: 40px 0; }
    /* 優化手機端體驗 */
    @media (max-width: 600px) {
      body { padding: 10px; }
      .card { padding: 15px; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>飲食照片紀錄</h1>
  
  <div class="card">
    <label for="datePicker">📅 紀錄日期</label>
    <input type="date" id="datePicker">
  </div>

  <div class="card" style="border-left: 5px solid #2563eb;">
    <h2 style="margin-top:0;">新增飲食紀錄</h2>
    <select id="mealType">
      <option>早餐</option>
      <option>午餐</option>
      <option>晚餐</option>
      <option>點心</option>
      <option>宵夜</option>
      <option>其他</option>
    </select>
    <input type="text" id="customType" placeholder="請手動輸入餐別 (如：下午茶)" style="display:none;">
    
    <label for="photoInput" style="display:block; margin-top:15px;">📷 上傳食物照片</label>
    <input type="file" id="photoInput" accept="image/*">
    
    <div id="previewContainer" style="display:none;">
      <div id="previewTime" class="time"></div>
      <img id="preview">
    </div>
    
    <textarea id="note" rows="3" placeholder="備註（例如：飯前血糖、食物組成、份量等...）"></textarea>
    <button onclick="addEntry()">➕ 新增紀錄並儲存</button>
  </div>

  <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0;">
  
  <div id="entries"></div>
</div>
