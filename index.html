<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飲食照片紀錄</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f8fafc; margin:0; padding:20px; }
    .container { max-width:900px; margin:auto; }
    .card { background:white; border-radius:16px; padding:20px; margin-bottom:20px; box-shadow:0 4px 10px rgba(0,0,0,0.08); }
    input, select, textarea, button { width:100%; padding:10px; margin-top:10px; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; }
    button { background:#2563eb; color:white; border:none; cursor:pointer; }
    button:hover { background:#1d4ed8; }
    img { width:100%; max-height:300px; object-fit:contain; background:#f1f5f9; border-radius:12px; margin-top:10px; }
    .delete { background:#dc2626; }
    .time { font-size:14px; color:#666; margin-top:8px; }
  </style>
</head>
<body>
<div class="container">
  <h1>彈性飲食照片紀錄</h1>
  <input type="date" id="datePicker">

  <div class="card">
    <h2>新增飲食紀錄</h2>
    <select id="mealType">
      <option>早餐</option>
      <option>午餐</option>
      <option>點心</option>
      <option>宵夜</option>
      <option>其他</option>
    </select>
    <input type="text" id="customType" placeholder="請輸入餐別" style="display:none;">
    <input type="file" id="photoInput" accept="image/*">
    <div id="previewTime" class="time"></div>
    <img id="preview" style="display:none;">
    <textarea id="note" rows="3" placeholder="備註（時間、份量、血糖等）"></textarea>
    <button onclick="addEntry()">➕ 新增</button>
  </div>

  <div id="entries"></div>
  <button onclick="saveAll()">💾 儲存全部</button>
</div>

<script>
let entries = [];
let currentPhoto = '';
let currentPhotoTime = '';

document.getElementById('mealType').addEventListener('change', function() {
  document.getElementById('customType').style.display = this.value === '其他' ? 'block' : 'none';
});

document.getElementById('photoInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    currentPhoto = evt.target.result;
    currentPhotoTime = new Date(file.lastModified).toLocaleString('zh-TW');
    document.getElementById('preview').src = currentPhoto;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('previewTime').innerText = '📅 拍攝時間：' + currentPhotoTime;
    e.target.value = '';
  };
  reader.readAsDataURL(file);
});

function addEntry() {
  const mealType = document.getElementById('mealType').value;
  const customType = document.getElementById('customType').value;
  const note = document.getElementById('note').value;
  const type = mealType === '其他' ? customType : mealType;
  if (!type || !currentPhoto) return;

  entries.push({ id: Date.now(), type, note, photo: currentPhoto, time: currentPhotoTime });
  renderEntries();

  document.getElementById('note').value = '';
  document.getElementById('customType').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('previewTime').innerText = '';
  currentPhoto = '';
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  renderEntries();
}

function renderEntries() {
  const div = document.getElementById('entries');
  div.innerHTML = entries.map(e => `
    <div class="card">
      <h3>${e.type}</h3>
      <div class="time">📅 ${e.time}</div>
      <img src="${e.photo}">
      <p>${e.note}</p>
      <button class="delete" onclick="deleteEntry(${e.id})">刪除</button>
    </div>
  `).join('');
}

function saveAll() {
  const date = document.getElementById('datePicker').value;
  localStorage.setItem('meal-' + date, JSON.stringify(entries));
  alert('已儲存');
}
</script>
</body>
</html>
